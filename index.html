<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyshadow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #title-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      z-index: 10;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      pointer-events: none;
    }
    #title-screen h1 {
      font-size: 4rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 2rem;
    }
    #title-prompt {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      opacity: 0.4;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    #pause-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      pointer-events: none;
    }
    #pause-overlay h2 {
      font-size: 2.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 300;
    }
  </style>
  <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.1/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="title-screen">
    <h1>Polyshadow</h1>
    <p id="title-prompt">Press any key to begin</p>
  </div>
  <div id="pause-overlay">
    <h2>Paused</h2>
  </div>
  <script type="module" src="game/main.js"></script>
</body>
</html>
