<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyshadow</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #title-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      z-index: 10;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      pointer-events: none;
    }
    #title-screen h1 {
      font-size: 4rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 2rem;
    }
    #title-prompt {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      opacity: 0.4;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    #pause-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      pointer-events: none;
    }
    #pause-overlay h2 {
      font-size: 2.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 300;
    }
    #hud-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
    }
    #credits-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 8;
      pointer-events: none;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      line-height: 2;
    }
    #credits-overlay h2 {
      font-size: 2rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 1rem;
    }
    #credits-overlay p {
      font-size: 1rem;
      letter-spacing: 0.15em;
      opacity: 0.8;
    }
    #transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9;
      pointer-events: none;
      opacity: 0;
      transition: none;
    }
    #arena-name {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 2rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-weight: 300;
      opacity: 0;
    }
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 100;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #loading-screen h1 {
      font-size: 3rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #loading-screen p {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      opacity: 0.4;
    }
  </style>
  <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.1/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <canvas id="hud-canvas"></canvas>
  <div id="title-screen">
    <h1>Polyshadow</h1>
    <p id="title-prompt">Press any key to begin</p>
  </div>
  <div id="pause-overlay">
    <h2>Paused</h2>
  </div>
  <div id="credits-overlay">
    <h2>Polyshadow</h2>
    <p>The shadows have lifted</p>
    <p style="margin-top: 2rem;">Thank you for playing</p>
  </div>
  <div id="gamepad-hint">Gamepad connected</div>
  <div id="loading-screen">
    <h1>Polyshadow</h1>
    <div class="spinner"></div>
    <p>Loading</p>
  </div>
  <div id="transition-overlay"></div>
  <div id="arena-name"></div>
  <script type="module" src="game/main.js"></script>
</body>
</html>
