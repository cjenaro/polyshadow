<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyshadow</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><polygon points='16,2 20,12 30,14 22,22 24,32 16,27 8,32 10,22 2,14 12,12' fill='%23333'/></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #title-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      z-index: 10;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      pointer-events: none;
    }
    #title-screen h1 {
      font-size: 4rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 2rem;
    }
    #title-prompt {
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      opacity: 0.4;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    #pause-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      pointer-events: none;
    }
    #pause-overlay h2 {
      font-size: 2.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 300;
    }
    #hud-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 5;
      pointer-events: none;
    }
    #credits-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 8;
      pointer-events: none;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      line-height: 2;
    }
    #credits-overlay h2 {
      font-size: 2rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 1rem;
    }
    #credits-overlay p {
      font-size: 1rem;
      letter-spacing: 0.15em;
      opacity: 0.8;
    }
    #transition-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 9;
      pointer-events: none;
      opacity: 0;
      transition: none;
    }
    #tutorial-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      z-index: 10;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      pointer-events: none;
      transition: opacity 1.5s ease-out;
    }
    #tutorial-overlay.visible {
      display: flex;
    }
    #tutorial-overlay.fading {
      opacity: 0;
    }
    #tutorial-overlay h2 {
      font-size: 1.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    .tutorial-controls {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-bottom: 2.5rem;
    }
    .tutorial-row {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      opacity: 0.7;
    }
    .tutorial-key {
      display: inline-block;
      min-width: 3.5rem;
      padding: 0.3rem 0.6rem;
      text-align: center;
      letter-spacing: 0.1em;
      font-size: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 3px;
      font-weight: 300;
    }
    .tutorial-label {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      opacity: 0.8;
    }
    #tutorial-prompt {
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      opacity: 0.35;
      animation: pulse 2.5s ease-in-out infinite;
    }
    #arena-name {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 2rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-weight: 300;
      opacity: 0;
    }
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 100;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #loading-screen h1 {
      font-size: 3rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-weight: 300;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #loading-screen p {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      opacity: 0.4;
    }
    #gamepad-hint {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
      color: rgba(255, 255, 255, 0.5);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    #gamepad-hint.visible {
      opacity: 1;
    }
  </style>
  <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.1/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <canvas id="hud-canvas"></canvas>
  <div id="title-screen">
    <h1>Polyshadow</h1>
    <p id="title-prompt">Press any key to begin</p>
  </div>
  <div id="pause-overlay">
    <h2>Paused</h2>
  </div>
  <div id="credits-overlay">
    <h2>Polyshadow</h2>
    <p>The shadows have lifted</p>
    <p style="margin-top: 2rem;">Thank you for playing</p>
  </div>
  <div id="gamepad-hint">Gamepad connected</div>
  <div id="loading-screen">
    <h1>Polyshadow</h1>
    <div class="spinner"></div>
    <p>Loading</p>
  </div>
  <div id="tutorial-overlay">
    <h2>Defeat the Colossus</h2>
    <div class="tutorial-controls">
      <div class="tutorial-row">
        <span class="tutorial-key">W A S D</span>
        <span class="tutorial-label">Move</span>
      </div>
      <div class="tutorial-row">
        <span class="tutorial-key">Space</span>
        <span class="tutorial-label">Jump</span>
      </div>
      <div class="tutorial-row">
        <span class="tutorial-key">E</span>
        <span class="tutorial-label">Grab</span>
      </div>
      <div class="tutorial-row">
        <span class="tutorial-key">Click</span>
        <span class="tutorial-label">Attack</span>
      </div>
    </div>
    <p id="tutorial-prompt">Press any key to begin</p>
  </div>
  <div id="transition-overlay"></div>
  <div id="arena-name"></div>
  <script type="module" src="game/main.js"></script>
</body>
</html>
